name: Update Location

on:
  workflow_dispatch:
    inputs:
      city:
        description: 'City name (e.g. Shanghai, Chengdu, Beijing)'
        required: true
        type: string
      emoji:
        description: 'Emoji (e.g. 📍 🌏 ✈️ 🧳)'
        required: false
        default: '📍'
        type: string

jobs:
  update-location:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update location in README
        run: |
          python3 << 'PYEOF'
          import urllib.parse, re

          city = "${{ github.event.inputs.city }}"
          emoji = "${{ github.event.inputs.emoji }}"
          encoded = urllib.parse.quote(f"{emoji} {city}")

          with open("README.md", "r") as f:
              content = f.read()

          # Match the location line specifically - it's the last typing-svg line inside <sub>
          content = re.sub(
              r'(<sub>.*?lines=)([^&\)"\s]+)',
              rf'\g<1>{encoded}',
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update location to ${{ github.event.inputs.city }}"
          git push
